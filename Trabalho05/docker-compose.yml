    networks:
      lab_net_04: { ipv4_address: 172.28.4.12 }
    depends_on: [roteador]
  vitima_19:
    <<: *vitima
    container_name: vitima_19
    networks:
      lab_net_04: { ipv4_address: 172.28.4.13 }
    depends_on: [roteador]
  vitima_20:
    <<: *vitima
    container_name: vitima_20
    networks:
      lab_net_04: { ipv4_address: 172.28.4.14 }
    depends_on: [roteador]

  # ---------- VÍTIMAS - sub-rede 05 ----------
  vitima_21:
    <<: *vitima
    container_name: vitima_21
    networks:
      lab_net_05: { ipv4_address: 172.28.5.10 }
    depends_on: [roteador]
