networks:
  lab_net_01:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
  lab_net_02:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.2.0/24
  lab_net_03:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.3.0/24
  lab_net_04:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.4.0/24
  lab_net_05:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.5.0/24
